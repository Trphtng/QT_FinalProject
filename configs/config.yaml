project:
  name: drl_portfolio_management
  seed: 42
  output_dir: outputs

data:
  provider: "yahoo"
  vn_source: "VCI"
  tickers:
    - AAPL
    - MSFT
    - GOOGL
    - AMZN
    - TSLA
    - META
    - NVDA
    - JPM
    - XOM
    - NFLX
  start_date: "2018-01-01"
  end_date: null
  interval: "1d"
  lookback_window: 30
  min_history: 120
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  max_retries: 3
  retry_delay_seconds: 2
  use_cache: true
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15
  walk_forward:
    enabled: true
    train_window: 756
    val_window: 126
    test_window: 126
    step_size: 63

features:
  price_column: "Close"
  include_columns:
    - Open
    - High
    - Low
    - Close
    - Volume
    - Return
    - Return5
    - Return20
    - LogReturn
    - ATR14
    - RSI14
    - MACD
    - MACDSignal
    - MACDHist
    - BBUpper
    - BBMiddle
    - BBLower
    - SMA10
    - SMA20
    - EMA20
    - Volatility20
    - RealizedVol20
    - Momentum20
    - DownsideVol20
    - TrendSlope20
    - RollingCorrMarket20
    - DrawdownLocalPeak
    - VolumeChange
    - BBWidth
    - StochasticK
    - StochasticD
    - PriceToSMA50
    - PriceToSMA100
  normalize_features: true
  covariance_window: 20
  market_regime:
    enabled: true
    ma_fast: 20
    ma_slow: 100

environment:
  initial_cash: 1000000.0
  fee_rate: 0.001
  slippage_rate: 0.0005
  kappa: 1.0
  # Penalty coefficients — calibrated to daily log-return scale (~1e-3)
  lambda_var: 0.5          # Downside variance penalty (mild)
  lambda_turnover: 0.01    # Turnover penalty (discourage noise trading)
  lambda_drawdown: 0.05    # Drawdown penalty above threshold
  drawdown_penalty_threshold: 0.08
  drawdown_penalty_power: 1.5
  # Bonus coefficients
  lambda_return_bonus: 3.0   # Reward positive excess returns
  lambda_sharpe_bonus: 0.3   # EMA-based smooth Sharpe bonus
  sharpe_window: 20
  lambda_momentum_bonus: 0.1  # Trend-following bonus (re-enabled)
  momentum_window: 20
  momentum_scale: 50.0
  return_target: 0.0
  reward_mode: "log_return"
  # Rebalancing: every 5 days with partial execution (smoother)
  rebalance_frequency: 5
  rebalance_alpha: 0.5
  risk_free_rate: 0.0
  action_mode: "weights"
  include_prev_weights: true

model:
  encoder_type: "transformer"
  hidden_dim: 128
  num_layers: 2
  dropout: 0.2
  cnn_channels: 64
  lstm_layers: 2
  transformer_heads: 4
  transformer_ff_dim: 256

training:
  device: "auto"
  use_mixed_precision: true
  total_epochs: 50
  max_rollout_steps_per_fold: 250
  rollout_epochs: 1
  ppo_epochs: 12
  minibatch_size: 256
  # PPO core hyperparameters
  gamma: 0.995          # Higher discount for long-horizon portfolio returns
  gae_lambda: 0.95      # Standard GAE lambda
  clip_epsilon: 0.15    # Clip range for PPO ratio
  value_loss_coef: 0.5
  # Entropy: start high for exploration, decay slowly
  entropy_coef_start: 0.01
  entropy_coef_end: 0.001
  # Learning: small LR, high weight decay for regularization
  learning_rate: 0.00005
  weight_decay: 0.0001
  max_grad_norm: 0.5    # Gradient clipping
  lr_scheduler_patience: 12
  lr_scheduler_factor: 0.5
  early_stopping_patience: 30
  checkpoint_path: "outputs/models/best_model.pt"
  resume_from: null
  log_interval: 1

evaluation:
  benchmark_rebalance_every: 21
  rolling_sharpe_window: 63
  report_path: "outputs/reports/metrics_summary.json"
  comparison_csv: "outputs/reports/baseline_comparison.csv"
  figure_dir: "outputs/figures/us"
  walk_forward_summary_path: "outputs/reports/walk_forward_summary.json"
